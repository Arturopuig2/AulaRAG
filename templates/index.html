<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula - Asistente Escolar</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" aria-label="Asignaturas">
            <div class="logo-container" style="text-align: center; margin-bottom: 30px;">
                <img src="/static/img/logo.png" alt="Aula Logo"
                    style="max-width: 100%; height: auto; max-height: 80px;">
            </div>
            <nav class="subjects-nav">
                <button class="subject-btn btn-blue active" data-subject="matematicas">
                    <span class="icon">📐</span>
                    <span class="label">Mates</span>
                </button>
                <button class="subject-btn btn-green" data-subject="lengua">
                    <span class="icon">📚</span>
                    <span class="label">Lengua</span>
                </button>
                <button class="subject-btn btn-orange" data-subject="valenciano">
                    <span class="icon">🦇</span>
                    <span class="label">Valencià</span>
                </button>
                <button class="subject-btn btn-yellow" data-subject="ingles">
                    <span class="icon">🇬🇧</span>
                    <span class="label">Inglés</span>
                </button>
            </nav>

            <!-- Syllabus Filters (Hidden by default, shown when Lengua is selected) -->
            <div id="syllabus-filters" class="syllabus-filters" style="display: none;">
                <h3>Filtrar Temario</h3>

                <div class="filter-group">
                    <label for="filter-curso">Curso</label>
                    <select id="filter-curso">
                        <option value="">Selecciona Curso...</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="filter-bloque">Bloque</label>
                    <select id="filter-bloque" disabled>
                        <option value="">Selecciona Bloque...</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="filter-contenido">Contenido</label>
                    <select id="filter-contenido" disabled>
                        <option value="">Selecciona Contenido...</option>
                    </select>
                </div>

                <button id="btn-estudiar" class="btn-estudiar" disabled>¡Vamos a repasar!</button>
            </div>
            <div class="user-profile">
                <div class="avatar">👨‍🎓</div>
                <span>Tú</span>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-container">
            <header class="chat-header">
                <h2 id="current-subject-title">Pizarra Digital - Matemáticas</h2>
                <button id="audio-toggle" class="audio-toggle-btn muted" title="Activar Narración por Voz"></button>
            </header>

            <div class="chat-messages" id="chat-messages">
                <!-- Welcome Message -->
                <div class="message assistant">
                    <div class="bubble">
                        ¡Hola! ¿En qué puedo ayudarte? 😊
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <form id="chat-form" class="input-form">
                    <input type="text" id="user-input" placeholder="Pregunta lo que quieras..." autocomplete="off">
                    <button type="submit" class="send-btn" id="send-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/js/chat.js"></script>
</body>

</html>
